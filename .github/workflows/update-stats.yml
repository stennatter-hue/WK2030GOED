name: WK-spelersstats bijwerken

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakketten installeren
        run: pip install requests beautifulsoup4 lxml

      - name: Stats ophalen
        run: |
          script=$(ls *.py | head -n 1)
          echo "Draai script: $script"
          python "$script"

      - name: spelers.json committen als er iets veranderd is
        run: |
          if [ -n "$(git status --porcelain spelers.json)" ]; then
            git config user.name "stats-bot"
            git config user.email "stats-bot@users.noreply.github.com"
            git add spelers.json
            git commit -m "auto: spelersstats bijgewerkt"
            git push
            echo "spelers.json bijgewerkt en gepusht"
          else
            echo "geen wijzigingen"
          fi
